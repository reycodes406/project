<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>


    <title>Rey Weather App</title><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>

<body>
  <div class="weather-app">
  <header>
    <form class="search-form" id="search-form">
      <input type="search" placeholder="Enter city" required id="search-form-input" class="search-form-input"/>
      <input type="submit" value="search" class="search-form-button"/>
    </form>
  </header>

  <main>
    <div class="weather-app-data">
    <div>
    <h1 class="weather-app-city" id="city">Paris</h1>
    <p class="weather-app-details">Tuesday  14:45, Scattered clouds
    <br>
    Humidity: <strong>45%</strong>, Wind: <strong>3.13km/h</strong> </p>
    </div>

    <div class="weather-app-temperature-container"> 
   <div class="weather-app-icon"> 🌫️🌫️</div>
   <div class="weather-app-temperature"> 10 </div>
   <div class="weather-app-unit">°c</div>
  </div>
    </div>
  </main>
  <footer>
    coded by Regina|
    <a href="https://github.com/reycodes406" target="_blank">Github</a>
    |
    <a href="https://app.netlify.com/projects/sage-kitten-49d36c/overview" target="_blank">Live website</a>

  </footer>

</div>
<script src="src/index.js"></script>
</body>
</html>
